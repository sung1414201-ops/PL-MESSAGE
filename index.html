<title>특강 문자발송</title>

  .hero .sub{ font-size:12.5px; color:var(--sub); margin-top:2px; }

    background:#fff; border:2px solid var(--line); color:var(--sub);

<script>

function studentsKey(courseId){ return 'sg_students_' + courseId; }
function topicsKey(courseId){ return 'sg_topics_' + courseId; }

/* ---------- storage ---------- */
async function apiGet(key){
  const res = await fetch(`${API_URL}?action=get&key=${encodeURIComponent(key)}`);
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'get failed');
  return data.value;
}
async function apiBatchGet(keys){
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'batchGet', keys }) });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'batchGet failed');
  return data.values || {};
}
async function apiSet(key, value){
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'set', key, value }) });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'set failed');
  return true;
}
async function apiDelete(key){
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'delete', key }) });
  const data = await res.json();
  return !!data.ok;
}
async function loadJSON(key, fallback){
  try{ const raw = await apiGet(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ storageAvailable = false; return fallback; }
}
async function saveJSON(key, value){
  try{ await apiSet(key, JSON.stringify(value)); storageAvailable = true; flashSave(true); return true; }
  catch(e){ storageAvailable = false; flashSave(false); return false; }
}
function flashSave(ok){
  const el = document.getElementById('savePill');
  el.textContent = ok ? '저장됨 ✓' : '⚠ 저장 실패';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

/* ---------- setup screen (첫 실행 시 백엔드 URL 연결) ---------- */
function renderSetup(){
  document.getElementById('app').innerHTML = `
    <div class="setup-wrap">
      <h2>🎨 처음 설정 — 저장소 연결</h2>
      <p style="color:var(--sub);font-size:13px;line-height:1.7;">
        새 구글시트에 Apps Script를 배포해서 나온 <b>웹 앱 URL</b>을 붙여넣어주세요.<br>
        (형태: <code>https://script.google.com/macros/s/xxxx/exec</code>)
      </p>
      <input type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/...">
      <button onclick="saveApiUrl()">연결하고 시작하기</button>
      <div id="setupMsg" style="margin-top:10px;font-size:13px;"></div>
    </div>
  `;
}
async function saveApiUrl(){
  const input = document.getElementById('setupUrl');
  const url = input.value.trim();
  const msg = document.getElementById('setupMsg');
  if(!url.startsWith('https://script.google.com/')){
    msg.style.color = '#e05'; msg.textContent = '올바른 Apps Script 웹 앱 URL이 아닌 것 같아요.';
    return;
  }
  msg.style.color = 'var(--sub)'; msg.textContent = '연결 확인 중...';
  API_URL = url;
  try{
    const res = await fetch(`${API_URL}?action=list&prefix=`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || '연결 실패');
    localStorage.setItem('sg_api_url', url);
    location.reload();
  }catch(e){
    msg.style.color = '#e05';
    msg.textContent = '연결에 실패했어요. 배포 시 "액세스 권한: 전체(Anyone)"인지 확인해주세요.';
    API_URL = '';
  }
}

async function importSeedCourses(){
  if(!confirm('시트 기준 특강 21개를 한 번에 불러올까요?\n이미 있는 특강/학생은 건너뛰어요.')) return;
  let addedCourses = 0, addedStudents = 0;
  for(const seed of SEED_COURSES){
    let c = courses.find(x => x.name === seed.name);
    if(!c){
      c = { id:'course_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name:seed.name, day:seed.day, time:seed.time, teacher:seed.teacher };
      courses.push(c);
      addedCourses++;
    }
    let cStudents = await loadJSON(studentsKey(c.id), []);
    seed.students.forEach(name => {
      if(!cStudents.some(s => s.name === name)){
        cStudents.push({ id:'s_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name, scores:{}, comments:{} });
        addedStudents++;
      }
    });
    await saveJSON(studentsKey(c.id), cStudents);
    if(!(await apiGet(topicsKey(c.id)))){
      await saveJSON(topicsKey(c.id), {1:'',2:'',3:'',4:'',5:''});
    }
  }
  await saveJSON(COURSES_KEY, courses);
  if(!currentCourseId && courses.length){ currentCourseId = courses[0].id; }
  if(currentCourseId) await loadCourseData(currentCourseId);
  render();
  alert(`불러오기 완료!\n특강 ${addedCourses}개, 학생 ${addedStudents}명 등록됐어요.`);
}

/* ---------- init ---------- */
async function init(){
  if(!API_URL){ renderSetup(); return; }
  document.getElementById('app').innerHTML = '<div class="loading" style="padding:60px;text-align:center;color:var(--sub);">불러오는 중...</div>';
  courses = await loadJSON(COURSES_KEY, []);
  if(courses.length > 0){
    currentCourseId = courses[0].id;
    await loadCourseData(currentCourseId);
  }
  render();
}

async function loadCourseData(courseId){
  let batch = {};
  try{ batch = await apiBatchGet([studentsKey(courseId), topicsKey(courseId)]); }
  catch(e){ storageAvailable = false; }
  students = batch[studentsKey(courseId)] ? JSON.parse(batch[studentsKey(courseId)]) : [];
  students.forEach(s => { if(!s.scores) s.scores={}; if(!s.comments) s.comments={}; });
  topics = batch[topicsKey(courseId)] ? JSON.parse(batch[topicsKey(courseId)]) : {1:'',2:'',3:'',4:'',5:''};
}

/* ---------- course management ---------- */
async function addCourse(){
  const name = prompt('새 특강 이름을 입력해주세요 (예: 대수 특강)');
  if(!name || !name.trim()) return;
  const id = 'course_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  courses.push({ id, name: name.trim(), day:'', time:'', teacher:'' });
  await saveJSON(COURSES_KEY, courses);
  currentCourseId = id;
  students = [];
  topics = {1:'',2:'',3:'',4:'',5:''};
  await saveJSON(studentsKey(id), students);
  await saveJSON(topicsKey(id), topics);
  render();
}

let editingCourseInfo = false;
function toggleCourseInfoEdit(){
  editingCourseInfo = !editingCourseInfo;
  render();
}
async function saveCourseInfo(){
  const c = courses.find(x => x.id === currentCourseId);
  if(!c) return;
  c.name = document.getElementById('editCourseName').value.trim() || c.name;
  c.day = document.getElementById('editCourseDay').value.trim();
  c.time = document.getElementById('editCourseTime').value.trim();
  c.teacher = document.getElementById('editCourseTeacher').value.trim();
  await saveJSON(COURSES_KEY, courses);
  editingCourseInfo = false;
  render();
}

async function deleteCourse(courseId, evt){
  if(evt) evt.stopPropagation();
  const c = courses.find(x => x.id === courseId);
  if(!c) return;
  if(!confirm(`'${c.name}'을(를) 삭제할까요?\n학생 명단과 성적이 모두 사라지고 되돌릴 수 없어요.`)) return;
  courses = courses.filter(x => x.id !== courseId);
  await saveJSON(COURSES_KEY, courses);
  try{ await apiDelete(studentsKey(courseId)); }catch(e){}
  try{ await apiDelete(topicsKey(courseId)); }catch(e){}
  if(currentCourseId === courseId){
    if(courses.length){ currentCourseId = courses[0].id; await loadCourseData(currentCourseId); }
    else{ currentCourseId = null; students = []; topics = {1:'',2:'',3:'',4:'',5:''}; }
  }
  render();
}

async function selectCourse(courseId){
  if(courseId === currentCourseId) return;
  currentCourseId = courseId;
  expandedStudentId = null;
  document.getElementById('app').innerHTML = '<div class="loading" style="padding:60px;text-align:center;color:var(--sub);">불러오는 중...</div>';
  await loadCourseData(courseId);
  render();
}

/* ---------- topics ---------- */
async function updateTopic(round, value){
  topics[round] = value;
  await saveJSON(topicsKey(currentCourseId), topics);
}

/* ---------- students ---------- */
async function addStudent(){
  const input = document.getElementById('newStudentName');
  const name = input.value.trim();
  if(!name) { input.focus(); return; }
  students.push({ id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), name, scores:{}, comments:{} });
  input.value = '';
  await saveJSON(studentsKey(currentCourseId), students);
  render();
}
async function deleteStudent(studentId, evt){
  if(evt) evt.stopPropagation();
  if(!confirm('이 학생을 삭제할까요? 성적 기록도 함께 사라져요.')) return;
  students = students.filter(s => s.id !== studentId);
  if(expandedStudentId === studentId) expandedStudentId = null;
  await saveJSON(studentsKey(currentCourseId), students);
  render();
}
async function updateScore(studentId, round, value){
  const s = students.find(x => x.id === studentId);
  if(!s) return;
  if(value === ''){ delete s.scores[round]; }
  else{ s.scores[round] = Number(value); }
  await saveJSON(studentsKey(currentCourseId), students);
  renderTableOnly();
}
async function updateComment(studentId, round, value){
  const s = students.find(x => x.id === studentId);
  if(!s) return;
  s.comments = s.comments || {};
  s.comments[round] = value;
  await saveJSON(studentsKey(currentCourseId), students);
  renderTableOnly();
}
function toggleExpand(studentId){
  expandedStudentId = (expandedStudentId === studentId) ? null : studentId;
  renderTableOnly();
}

/* ---------- grade calc & message ---------- */
function roundStats(round){
  const vals = students.map(s => s.scores[round]).filter(v => v !== undefined && v !== null && v !== '').map(Number);
  const count = vals.length;
  const avg = count ? vals.reduce((a,b)=>a+b,0) / count : 0;
  return { count, avg };
}
function formatAvg(n){
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}
function rankFor(round, score){
  const vals = students.map(s => s.scores[round]).filter(v => v !== undefined && v !== null && v !== '').map(Number);
  return 1 + vals.filter(v => v > score).length;
}
function generateMessage(student, round){
  const score = student.scores[round];
  if(score === undefined || score === null || score === '') return null;
  const { count, avg } = roundStats(round);
  const rank = rankFor(round, score);
  const course = courses.find(c => c.id === currentCourseId);
  const comment = (student.comments && student.comments[round]) || '';
  return [
    `${student.name}학생`,
    `${course ? course.name : ''} ${round}회차 일일TEST 성적`,
    `점수 : ${score}점`,
    `평균 : ${formatAvg(avg)}점`,
    `${count}명중 ${rank}등`,
    ``,
    `학생 특이사항 : ${comment}`
  ].join('\n');
}
function copyMessage(studentId, round, btn){
  const s = students.find(x => x.id === studentId);
  if(!s) return;
  const text = generateMessage(s, round);
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '복사됨 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1300);
  });
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById('app');
  let html = `
    <div class="hero">
      <div>
        <h1>🎨 특강 문자발송</h1>
        <div class="sub">성적만 입력하면 학생별 문자가 자동으로 만들어져요</div>
      </div>
    </div>
    <div class="course-tabs">
      ${courses.map(c => `
        <div class="course-tab ${c.id === currentCourseId ? 'active' : ''}" onclick="selectCourse('${c.id}')">
          ${escapeHtml(c.name)}
          <span class="x" onclick="deleteCourse('${c.id}', event)">✕</span>
        </div>`).join('')}
      <button class="course-tab-add" onclick="addCourse()">＋ 새 특강</button>
    </div>
    <button class="seed-btn" onclick="importSeedCourses()">📥 7월 방학특강 명단 불러오기 (전체 21개)</button>
  `;

  if(!currentCourseId){
    html += `<div class="no-course">아직 특강이 없어요.<br>위에서 "＋ 새 특강"을 눌러 시작해보세요.</div>`;
    app.innerHTML = html;
    return;
  }

  const currentCourse = courses.find(c => c.id === currentCourseId);
  html += `
    <div class="course-info-bar">
      ${editingCourseInfo ? `
        <div class="course-edit-form">
          <input id="editCourseName" placeholder="특강 이름" value="${escapeHtml(currentCourse.name||'')}">
          <input id="editCourseDay" placeholder="요일 (예: 월수금)" value="${escapeHtml(currentCourse.day||'')}">
          <input id="editCourseTime" placeholder="시간 (예: 12:30~16:30)" value="${escapeHtml(currentCourse.time||'')}">
          <input id="editCourseTeacher" placeholder="담당 (예: 김OO T)" value="${escapeHtml(currentCourse.teacher||'')}">
          <button onclick="saveCourseInfo()">저장</button>
        </div>
      ` : `
        <span>📅 <b>${escapeHtml(currentCourse.day || '요일 미입력')}</b></span>
        <span>🕐 <b>${escapeHtml(currentCourse.time || '시간 미입력')}</b></span>
        <span>👤 <b>${escapeHtml(currentCourse.teacher || '담당 미입력')}</b></span>
        <button class="edit-link" onclick="toggleCourseInfoEdit()">✏️ 정보 수정</button>
      `}
    </div>
  `;

  html += `
    <div class="topics-row">
      ${ROUNDS.map(r => `
        <div class="topic-card" style="background:var(--${ROUND_COLORS[r]}-soft);">
          <span class="rlabel" style="background:var(--${ROUND_COLORS[r]});">${r}회</span>
          <input type="text" placeholder="단원명" value="${escapeHtml(topics[r]||'')}" onchange="updateTopic(${r}, this.value)">
        </div>`).join('')}
    </div>

    <div class="add-student-bar">
      <input type="text" id="newStudentName" placeholder="학생 이름 입력" onkeydown="if(event.key==='Enter') addStudent()">
      <button onclick="addStudent()">학생 추가</button>
    </div>

    <div class="grade-card">
      <table class="grade-table" id="gradeTable"></table>
    </div>
  `;

  app.innerHTML = html;
  renderTableOnly();
}

function renderTableOnly(){
  const table = document.getElementById('gradeTable');
  if(!table) return;

  let thead = `<thead><tr>
    <th class="name-col">학생</th>
    ${ROUNDS.map(r => `<th style="color:${ROUND_HEX[r]};">${r}회</th>`).join('')}
    <th>문자</th>
  </tr></thead>`;

  let bodyRows = '';
  if(students.length === 0){
    bodyRows = `<tr><td colspan="7" class="empty-roster">아직 등록된 학생이 없어요. 위에서 이름을 입력해 추가해보세요.</td></tr>`;
  }else{
    students.forEach(s => {
      const filledRounds = ROUNDS.filter(r => s.scores[r] !== undefined && s.scores[r] !== null && s.scores[r] !== '');
      bodyRows += `
        <tr>
          <td class="name-cell">
            <div class="nm" onclick="toggleExpand('${s.id}')">${escapeHtml(s.name)} ${filledRounds.length ? '📩' : ''}</div>
          </td>
          ${ROUNDS.map(r => `
            <td class="${ROUND_COLORS[r]}-cell">
              <input type="number" class="score-input" value="${s.scores[r] !== undefined && s.scores[r] !== null ? s.scores[r] : ''}"
                placeholder="-" onchange="updateScore('${s.id}', ${r}, this.value)">
            </td>`).join('')}
          <td>
            <button class="del" onclick="toggleExpand('${s.id}')" title="문자 보기">${expandedStudentId === s.id ? '▲' : '▾'}</button>
            <button class="del" onclick="deleteStudent('${s.id}', event)" title="삭제">✕</button>
          </td>
        </tr>`;
      if(expandedStudentId === s.id){
        bodyRows += `<tr class="expand-row"><td colspan="7">${renderMessagesFor(s)}</td></tr>`;
      }
    });
  }

  let avgRow = `<tr class="avg-row"><td class="name-cell">회차 평균</td>`;
  ROUNDS.forEach(r => {
    const { count, avg } = roundStats(r);
    avgRow += `<td>${count ? formatAvg(avg) + '점' : '-'}</td>`;
  });
  avgRow += `<td></td></tr>`;

  table.innerHTML = thead + `<tbody>${bodyRows}</tbody><tfoot>${avgRow}</tfoot>`;
}

function renderMessagesFor(student){
  const filled = ROUNDS.filter(r => student.scores[r] !== undefined && student.scores[r] !== null && student.scores[r] !== '');
  if(filled.length === 0){
    return `<div class="no-scores-yet">아직 입력된 점수가 없어요. 점수를 넣으면 여기에 문자가 자동으로 만들어져요.</div>`;
  }
  return `<div class="msg-grid">
    ${filled.map(r => {
      const text = generateMessage(student, r);
      const comment = (student.comments && student.comments[r]) || '';
      return `
        <div class="msg-card" style="background:var(--${ROUND_COLORS[r]}-soft);">
          <span class="mhead" style="background:${ROUND_HEX[r]};">${r}회차</span>
          <pre>${escapeHtml(text)}</pre>
          <textarea placeholder="특이사항 입력..." onchange="updateComment('${student.id}', ${r}, this.value)">${escapeHtml(comment)}</textarea>
          <button class="copy-btn" onclick="copyMessage('${student.id}', ${r}, this)">복사하기</button>
        </div>`;
    }).join('')}
  </div>`;
}

init();
</script>
</body>
</html>
